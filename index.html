<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antonella Pirozzi | Frontend Developer</title>

    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/splash.css" rel="stylesheet">
</head>

<body>

    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <div class="splash" role="main">

        <div class="logo-ring" aria-hidden="true">
            <svg class="logo-ring__svg" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="90" cy="90" r="86" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="12 6"
                    stroke-linecap="round" />
                <defs>
                    <linearGradient id="ringGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#667eea" />
                        <stop offset="100%" stop-color="#764ba2" stop-opacity="0.3" />
                    </linearGradient>
                </defs>
            </svg>
            <img src="assets/images/logo.png" alt="Logo Antonella Pirozzi" class="logo-ring__img">
        </div>

        <p class="splash-label">Frontend Developer</p>

        <h1 class="splash-name"><em>Antonella Pirozzi</em></h1>

        <p class="splash-role">HTML &middot; CSS &middot; JavaScript &middot; Angular &middot; TypeScript</p>

        <a href="home.html" class="splash-btn" aria-label="Entra nel portfolio">
            Entra nel sito
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </a>

        <p class="splash-footer">&#169; 2026 Antonella Pirozzi</p>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, dots;
        const COLORS = ['#667eea', '#764ba2', '#a78bfa', '#818cf8'];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        function isMobile() { return window.innerWidth < 600; }
        function createDots(n) {
            return Array.from({ length: n }, () => ({
                x: Math.random() * W, y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                r: Math.random() * 2 + 1,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                alpha: Math.random() * 0.5 + 0.2,
            }));
        }
        function draw() {
            ctx.clearRect(0, 0, W, H);
            const bg = ctx.createRadialGradient(W * .3, H * .3, 0, W * .3, H * .3, W * .9);
            bg.addColorStop(0, 'rgba(28,18,72,0.98)');
            bg.addColorStop(1, 'rgba(8,6,26,1)');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            const MAX = 130;
            dots.forEach((d, i) => {
                d.x += d.vx; d.y += d.vy;
                if (d.x < 0 || d.x > W) d.vx *= -1;
                if (d.y < 0 || d.y > H) d.vy *= -1;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fillStyle = d.color;
                ctx.globalAlpha = d.alpha;
                ctx.fill();
                for (let j = i + 1; j < dots.length; j++) {
                    const o = dots[j];
                    const dx = d.x - o.x, dy = d.y - o.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < MAX) {
                        ctx.beginPath();
                        ctx.moveTo(d.x, d.y);
                        ctx.lineTo(o.x, o.y);
                        ctx.strokeStyle = '#667eea';
                        ctx.globalAlpha = (1 - dist / MAX) * 0.12;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', () => { resize(); dots = createDots(isMobile() ? 40 : 70); });
        resize();
        dots = createDots(isMobile() ? 40 : 70);
        draw();
    </script>

</body>

</html>
